version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - echo Installing dependencies...
      - npm install

  build:
    commands:
      - echo Building frontend...
      - npm run build

  post_build:
    commands:
      - echo Build completed
      - ls -al
      - ls -al dist

artifacts:
  base-directory: dist
  files:
    - '**/*'